services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: email-system-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: email-system-frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: "http://api:8000"
      API_KEY: "${API_KEY_1:-dev-api-key-12345}"
      API_TIMEOUT_SECONDS: "30"
    depends_on:
      - api
