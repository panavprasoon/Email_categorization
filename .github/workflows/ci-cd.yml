name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_api.txt
          pip install pytest pytest-cov

      - name: Download NLTK data
        run: |
          python -m nltk.downloader --quiet wordnet
          python -m nltk.downloader --quiet omw-1.4
          python -m nltk.downloader --quiet stopwords punkt

      - name: Run tests
        run: |
          pytest tests/test_auth.py tests/test_preprocessing.py tests/test_training.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t email-system-api:ci .

      - name: Build Frontend image
        run: docker build -f Dockerfile.frontend -t email-system-frontend:ci .
